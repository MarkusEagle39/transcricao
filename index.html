<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Transcrição">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Transcrição Instantânea</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #1f1f1f;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
  .header-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 40px; height: 40px;
    border: none; background: #1a1a1a; color: #fff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    flex-shrink: 0;
  }
  .icon-btn:active { background: #2a2a2a; }
  .icon-btn.success { background: #065f46; }

  @media (max-width: 380px) {
    .icon-btn { width: 36px; height: 36px; font-size: 16px; }
    header h1 { font-size: 14px; }
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    -webkit-user-select: text;
    user-select: text;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .placeholder {
    color: #555;
    font-size: 18px;
    font-weight: 400;
    text-align: center;
    margin: auto;
    padding: 0 24px;
    line-height: 1.5;
  }
  .placeholder strong { color: #10b981; }

  .bubble {
    max-width: 88%;
    padding: 14px 18px;
    border-radius: 18px;
    font-size: var(--font-size, 32px);
    line-height: 1.35;
    word-wrap: break-word;
    font-weight: 500;
  }
  .bubble .tag {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.65;
    margin-bottom: 6px;
  }
  .bubble-voice {
    align-self: flex-start;
    background: #1f1f1f;
    color: #ffffff;
    border-bottom-left-radius: 6px;
  }
  .bubble-voice.interim { color: #888; background: #151515; }
  .bubble-typed {
    align-self: flex-end;
    background: #065f46;
    color: #ffffff;
    border-bottom-right-radius: 6px;
  }
  .bubble-typed.speaking { box-shadow: 0 0 0 3px #10b981; }

  footer {
    flex-shrink: 0;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid #1f1f1f;
    background: #0a0a0a;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
  }
  .mic-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: #10b981;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn.listening {
    background: #ef4444;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    50% { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0); }
  }
  .kb-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: none;
    background: #1f2937;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.2s;
    flex-shrink: 0;
  }
  .kb-btn:active { transform: scale(0.95); background: #374151; }
  .btn-label {
    font-size: 11px;
    color: #666;
    text-align: center;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ctl-group { display: flex; flex-direction: column; align-items: center; }

  .status {
    font-size: 13px;
    color: #888;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
  }
  .status.error { color: #ef4444; }
  .status.speaking { color: #10b981; }

  /* Modal base */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #1a1a1a;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }
  .modal h2 { font-size: 18px; margin-bottom: 20px; }
  .setting { margin-bottom: 18px; }
  .setting label {
    display: block;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 8px;
  }
  .setting select, .setting input[type=range] {
    width: 100%;
    padding: 10px;
    background: #0a0a0a;
    color: #fff;
    border: 1px solid #333;
    border-radius: 8px;
    font-size: 15px;
  }
  .font-preview {
    font-size: var(--font-size, 32px);
    color: #fff;
    padding: 12px;
    background: #0a0a0a;
    border-radius: 8px;
    text-align: center;
    margin-top: 8px;
  }
  .modal-close, .btn-primary {
    width: 100%;
    padding: 14px;
    background: #10b981;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
  }
  .btn-secondary {
    width: 100%;
    padding: 14px;
    background: #2a2a2a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 500;
    margin-top: 8px;
    cursor: pointer;
  }
  .btn-row { display: flex; gap: 10px; }
  .btn-row > button { flex: 1; margin-top: 0; }

  /* Compose (tela de digitação) */
  .compose-overlay {
    position: fixed; inset: 0;
    background: #0a0a0a;
    display: none;
    flex-direction: column;
    z-index: 200;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .compose-overlay.show { display: flex; }
  .compose-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #1f1f1f;
  }
  .compose-header h2 { font-size: 16px; font-weight: 600; }
  .compose-body {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }
  #compose-input {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: var(--compose-font-size, 28px);
    line-height: 1.4;
    resize: none;
    font-family: inherit;
    -webkit-user-select: text;
    user-select: text;
  }
  #compose-input::placeholder { color: #444; }

  .quick-phrases {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid #1f1f1f;
  }
  .quick-phrase {
    padding: 8px 14px;
    background: #1f2937;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  .quick-phrase:active { background: #374151; }

  .compose-footer {
    display: flex;
    gap: 10px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid #1f1f1f;
  }
  .compose-footer button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-cancel { background: #2a2a2a; color: #fff; }
  .btn-speak { background: #10b981; color: #fff; }
  .btn-speak:disabled { opacity: 0.4; }

  /* Mensagem de não-suportado */
  .unsupported {
    padding: 24px;
    background: #2a1a1a;
    border: 1px solid #ef4444;
    border-radius: 12px;
    margin: 20px;
    font-size: 15px;
    line-height: 1.5;
  }
  .unsupported h3 { margin-bottom: 10px; color: #ef4444; }
</style>
</head>
<body>

<header>
  <h1>Transcrição Instantânea</h1>
  <div class="header-btns">
    <button class="icon-btn" id="btn-share" title="Salvar / Compartilhar (.txt)" aria-label="Salvar ou compartilhar">↗</button>
    <button class="icon-btn" id="btn-copy" title="Copiar texto" aria-label="Copiar">⧉</button>
    <button class="icon-btn" id="btn-clear" title="Limpar" aria-label="Limpar">✕</button>
    <button class="icon-btn" id="btn-settings" title="Ajustes" aria-label="Ajustes">⚙</button>
  </div>
</header>

<main id="main">
  <div class="placeholder" id="placeholder">
    Toque no <strong>microfone verde</strong> para transcrever a fala de outra pessoa.<br><br>
    Toque no <strong>teclado</strong> para digitar uma resposta que será falada em voz alta.
  </div>
</main>

<footer>
  <div class="controls">
    <div class="ctl-group">
      <button class="mic-btn" id="btn-mic" aria-label="Iniciar transcrição">🎤</button>
      <div class="btn-label">Ouvir</div>
    </div>
    <div class="ctl-group">
      <button class="kb-btn" id="btn-keyboard" aria-label="Digitar resposta">⌨</button>
      <div class="btn-label">Responder</div>
    </div>
  </div>
  <div class="status" id="status">Pronto</div>
</footer>

<!-- Modal de ajustes -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Ajustes</h2>

    <div class="setting">
      <label for="lang-select">Idioma</label>
      <select id="lang-select">
        <option value="pt-BR">Português (Brasil)</option>
        <option value="pt-PT">Português (Portugal)</option>
        <option value="en-US">English (US)</option>
        <option value="es-ES">Español</option>
        <option value="fr-FR">Français</option>
        <option value="it-IT">Italiano</option>
        <option value="de-DE">Deutsch</option>
        <option value="ja-JP">日本語</option>
      </select>
    </div>

    <div class="setting">
      <label for="font-range">Tamanho do texto: <span id="font-label">32</span>px</label>
      <input type="range" id="font-range" min="18" max="56" step="2" value="32">
      <div class="font-preview">Texto de exemplo</div>
    </div>

    <div class="setting">
      <label for="voice-select">Voz para leitura em voz alta</label>
      <select id="voice-select"><option>Carregando...</option></select>
    </div>

    <div class="setting">
      <label for="rate-range">Velocidade da fala: <span id="rate-label">1.0</span>x</label>
      <input type="range" id="rate-range" min="0.6" max="1.6" step="0.1" value="1">
    </div>

    <button class="modal-close" id="modal-close">Fechar</button>
  </div>
</div>

<!-- Tela de digitação -->
<div class="compose-overlay" id="compose">
  <div class="compose-header">
    <h2>Digite sua resposta</h2>
    <button class="icon-btn" id="btn-speak-preview" title="Ouvir texto digitado" aria-label="Ouvir">🔊</button>
  </div>
  <div class="compose-body">
    <textarea id="compose-input"
              placeholder="Escreva aqui. O texto será falado em voz alta..."
              autocomplete="off"
              autocorrect="on"
              autocapitalize="sentences"
              spellcheck="true"></textarea>
  </div>
  <div class="quick-phrases" id="quick-phrases">
    <!-- preenchido via JS -->
  </div>
  <div class="compose-footer">
    <button class="btn-cancel" id="btn-compose-cancel">Cancelar</button>
    <button class="btn-speak" id="btn-compose-send">Falar em voz alta</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const TTS = window.speechSynthesis;

  // Elementos
  const elMain = document.getElementById('main');
  const elPlaceholder = document.getElementById('placeholder');
  const elStatus = document.getElementById('status');
  const elMic = document.getElementById('btn-mic');
  const elKeyboard = document.getElementById('btn-keyboard');
  const elClear = document.getElementById('btn-clear');
  const elCopy = document.getElementById('btn-copy');
  const elShare = document.getElementById('btn-share');
  const elSettings = document.getElementById('btn-settings');
  const elModal = document.getElementById('modal');
  const elModalClose = document.getElementById('modal-close');
  const elLang = document.getElementById('lang-select');
  const elFontRange = document.getElementById('font-range');
  const elFontLabel = document.getElementById('font-label');
  const elVoiceSelect = document.getElementById('voice-select');
  const elRateRange = document.getElementById('rate-range');
  const elRateLabel = document.getElementById('rate-label');
  const elCompose = document.getElementById('compose');
  const elComposeInput = document.getElementById('compose-input');
  const elComposeCancel = document.getElementById('btn-compose-cancel');
  const elComposeSend = document.getElementById('btn-compose-send');
  const elSpeakPreview = document.getElementById('btn-speak-preview');
  const elQuickPhrases = document.getElementById('quick-phrases');

  if (!SR) {
    document.body.innerHTML = `
      <div class="unsupported">
        <h3>Navegador não suportado</h3>
        Seu navegador não suporta reconhecimento de voz via Web Speech API.<br><br>
        <strong>Recomendações:</strong><br>
        • No iPhone, use o <strong>Safari</strong> (iOS 14.5+).<br>
        • No Android, use o <strong>Chrome</strong>.<br>
        • Verifique se o site está sendo servido por HTTPS.
      </div>`;
    return;
  }

  // ===== Ajustes persistidos =====
  const settings = {
    lang: localStorage.getItem('lang') || 'pt-BR',
    fontSize: parseInt(localStorage.getItem('fontSize') || '32', 10),
    voiceURI: localStorage.getItem('voiceURI') || '',
    rate: parseFloat(localStorage.getItem('rate') || '1')
  };
  elLang.value = settings.lang;
  elFontRange.value = settings.fontSize;
  elFontLabel.textContent = settings.fontSize;
  elRateRange.value = settings.rate;
  elRateLabel.textContent = settings.rate.toFixed(1);
  document.documentElement.style.setProperty('--font-size', settings.fontSize + 'px');

  // ===== Frases rápidas =====
  const QUICK_PHRASES = [
    'Sim', 'Não', 'Obrigado(a)', 'Por favor',
    'Pode repetir?', 'Fale mais devagar', 'Não entendi',
    'Com licença', 'Tudo bem', 'Um momento'
  ];
  QUICK_PHRASES.forEach(phrase => {
    const btn = document.createElement('button');
    btn.className = 'quick-phrase';
    btn.textContent = phrase;
    btn.addEventListener('click', () => {
      const cur = elComposeInput.value.trim();
      elComposeInput.value = cur ? (cur + ' ' + phrase) : phrase;
      elComposeInput.focus();
    });
    elQuickPhrases.appendChild(btn);
  });

  // ===== Modelo de dados =====
  // messages: array de { type: 'voice' | 'typed', text: string }
  // interim: string em transcrição no momento
  const state = {
    messages: [],
    interim: ''
  };

  // ===== Renderização =====
  function render() {
    elMain.innerHTML = '';
    if (state.messages.length === 0 && !state.interim) {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = 'Toque no <strong>microfone verde</strong> para transcrever a fala de outra pessoa.<br><br>Toque no <strong>teclado</strong> para digitar uma resposta que será falada em voz alta.';
      elMain.appendChild(ph);
      return;
    }

    state.messages.forEach(m => {
      const b = document.createElement('div');
      b.className = 'bubble ' + (m.type === 'voice' ? 'bubble-voice' : 'bubble-typed');
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = m.type === 'voice' ? 'Ouviu' : 'Você';
      b.appendChild(tag);
      b.appendChild(document.createTextNode(m.text));
      if (m.speaking) b.classList.add('speaking');
      elMain.appendChild(b);
    });

    if (state.interim) {
      const b = document.createElement('div');
      b.className = 'bubble bubble-voice interim';
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = 'Ouvindo...';
      b.appendChild(tag);
      b.appendChild(document.createTextNode(state.interim));
      elMain.appendChild(b);
    }

    // auto-scroll para o final
    elMain.scrollTop = elMain.scrollHeight;
  }

  // ===== Reconhecimento de voz =====
  let recognition = null;
  let listening = false;
  let wantRestart = false;
  let ttsSpeaking = false;

  function createRecognition() {
    const r = new SR();
    r.lang = settings.lang;
    r.continuous = true;
    r.interimResults = true;
    r.maxAlternatives = 1;

    r.onresult = (event) => {
      let newFinal = '';
      let newInterim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        if (res.isFinal) newFinal += res[0].transcript;
        else newInterim += res[0].transcript;
      }
      if (newFinal) {
        newFinal = newFinal.trim();
        const last = state.messages[state.messages.length - 1];
        if (last && last.type === 'voice') {
          // concatena à última mensagem de voz para formar parágrafo contínuo
          last.text = (last.text + ' ' + newFinal).trim();
        } else {
          state.messages.push({ type: 'voice', text: newFinal });
        }
      }
      state.interim = newInterim.trim();
      render();
    };

    r.onerror = (e) => {
      console.warn('Erro SR:', e.error);
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        elStatus.textContent = 'Permissão do microfone negada';
        elStatus.className = 'status error';
        wantRestart = false;
        stopListening();
      } else if (e.error === 'no-speech') {
        elStatus.textContent = 'Aguardando fala...';
      } else if (e.error === 'network') {
        elStatus.textContent = 'Sem conexão (necessária p/ reconhecimento)';
        elStatus.className = 'status error';
      } else if (e.error === 'aborted') {
        // normal
      } else {
        elStatus.textContent = 'Erro: ' + e.error;
      }
    };

    r.onend = () => {
      if (wantRestart && listening && !ttsSpeaking) {
        try { r.start(); }
        catch (err) { setTimeout(() => { try { r.start(); } catch(e){} }, 300); }
      } else if (!wantRestart) {
        listening = false;
        elMic.classList.remove('listening');
        elMic.textContent = '🎤';
        if (!ttsSpeaking) {
          elStatus.textContent = 'Pronto';
          elStatus.className = 'status';
        }
      }
    };

    r.onstart = () => {
      if (!ttsSpeaking) {
        elStatus.textContent = 'Ouvindo...';
        elStatus.className = 'status';
      }
    };

    return r;
  }

  function startListening() {
    if (listening) return;
    recognition = createRecognition();
    try {
      recognition.start();
      listening = true;
      wantRestart = true;
      elMic.classList.add('listening');
      elMic.textContent = '■';
      elMic.setAttribute('aria-label', 'Parar transcrição');
      requestWakeLock();
    } catch (e) {
      elStatus.textContent = 'Erro ao iniciar: ' + e.message;
      elStatus.className = 'status error';
    }
  }

  function stopListening() {
    wantRestart = false;
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
    }
    if (state.interim) {
      const last = state.messages[state.messages.length - 1];
      if (last && last.type === 'voice') last.text += ' ' + state.interim;
      else state.messages.push({ type: 'voice', text: state.interim });
      state.interim = '';
      render();
    }
    listening = false;
    elMic.classList.remove('listening');
    elMic.textContent = '🎤';
    elMic.setAttribute('aria-label', 'Iniciar transcrição');
  }

  function pauseForTTS() {
    if (recognition && listening) {
      try { recognition.abort(); } catch(e) {}
    }
  }
  function resumeAfterTTS() {
    if (listening && wantRestart) {
      recognition = createRecognition();
      try { recognition.start(); } catch(e) {
        setTimeout(() => { try { recognition.start(); } catch(e){} }, 300);
      }
    }
  }

  // ===== Text-to-Speech =====
  let availableVoices = [];

  function loadVoices() {
    if (!TTS) return;
    availableVoices = TTS.getVoices();
    elVoiceSelect.innerHTML = '';

    // Filtra preferindo idioma atual, mas mostra todas
    const sorted = [...availableVoices].sort((a, b) => {
      const aMatch = a.lang.startsWith(settings.lang.split('-')[0]) ? 0 : 1;
      const bMatch = b.lang.startsWith(settings.lang.split('-')[0]) ? 0 : 1;
      if (aMatch !== bMatch) return aMatch - bMatch;
      return a.name.localeCompare(b.name);
    });

    if (sorted.length === 0) {
      const opt = document.createElement('option');
      opt.textContent = 'Nenhuma voz disponível';
      elVoiceSelect.appendChild(opt);
      return;
    }

    sorted.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.voiceURI;
      opt.textContent = v.name + ' (' + v.lang + ')' + (v.default ? ' — padrão' : '');
      elVoiceSelect.appendChild(opt);
    });

    // Selecionar preferido
    if (settings.voiceURI && sorted.some(v => v.voiceURI === settings.voiceURI)) {
      elVoiceSelect.value = settings.voiceURI;
    } else {
      const preferred = sorted.find(v => v.lang.startsWith(settings.lang.split('-')[0]));
      if (preferred) {
        elVoiceSelect.value = preferred.voiceURI;
        settings.voiceURI = preferred.voiceURI;
        localStorage.setItem('voiceURI', settings.voiceURI);
      }
    }
  }

  if (TTS) {
    loadVoices();
    TTS.onvoiceschanged = loadVoices;
  }

  function speak(text, msgRef) {
    if (!TTS || !text) return Promise.resolve();
    return new Promise((resolve) => {
      // Se o reconhecimento estiver ativo, pausa para não capturar a própria voz
      ttsSpeaking = true;
      pauseForTTS();

      const u = new SpeechSynthesisUtterance(text);
      const voice = availableVoices.find(v => v.voiceURI === settings.voiceURI);
      if (voice) {
        u.voice = voice;
        u.lang = voice.lang;
      } else {
        u.lang = settings.lang;
      }
      u.rate = settings.rate;
      u.pitch = 1;
      u.volume = 1;

      u.onstart = () => {
        elStatus.textContent = 'Falando em voz alta...';
        elStatus.className = 'status speaking';
        if (msgRef) { msgRef.speaking = true; render(); }
      };
      u.onend = () => {
        ttsSpeaking = false;
        if (msgRef) { delete msgRef.speaking; render(); }
        elStatus.textContent = listening ? 'Ouvindo...' : 'Pronto';
        elStatus.className = 'status';
        resumeAfterTTS();
        resolve();
      };
      u.onerror = (e) => {
        ttsSpeaking = false;
        if (msgRef) { delete msgRef.speaking; render(); }
        elStatus.textContent = 'Erro na leitura: ' + (e.error || 'desconhecido');
        elStatus.className = 'status error';
        resumeAfterTTS();
        resolve();
      };

      // iOS Safari às vezes precisa de um pequeno delay
      setTimeout(() => TTS.speak(u), 50);
    });
  }

  // ===== Compose (tela de digitação) =====
  function openCompose() {
    // Se estava ouvindo, mantém o estado mas para o reconhecimento enquanto digita
    if (listening) pauseForTTS();
    elCompose.classList.add('show');
    setTimeout(() => elComposeInput.focus(), 100);
  }

  function closeCompose() {
    elCompose.classList.remove('show');
    elComposeInput.value = '';
    if (TTS) TTS.cancel();
    ttsSpeaking = false;
    // retoma o reconhecimento se estava ativo
    if (listening && wantRestart) resumeAfterTTS();
  }

  async function sendTyped() {
    const text = elComposeInput.value.trim();
    if (!text) return;
    const msg = { type: 'typed', text };
    state.messages.push(msg);
    elComposeInput.value = '';
    elCompose.classList.remove('show');
    render();
    await speak(text, msg);
  }

  elKeyboard.addEventListener('click', openCompose);
  elComposeCancel.addEventListener('click', closeCompose);
  elComposeSend.addEventListener('click', sendTyped);
  elSpeakPreview.addEventListener('click', () => {
    const text = elComposeInput.value.trim();
    if (!text) return;
    if (TTS) TTS.cancel();
    speak(text);
  });
  elComposeInput.addEventListener('keydown', (e) => {
    // Enter + Shift = nova linha; Enter = enviar (só em teclado físico)
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.ctrlKey) {
      e.preventDefault();
      sendTyped();
    }
  });

  // ===== Handlers principais =====
  elMic.addEventListener('click', () => {
    if (listening) stopListening();
    else startListening();
  });

  elClear.addEventListener('click', () => {
    if (state.messages.length === 0 && !state.interim) return;
    if (confirm('Limpar toda a conversa?')) {
      state.messages = [];
      state.interim = '';
      render();
    }
  });

  // Monta o texto da conversa (usado por copiar e compartilhar)
  function buildConversationText(includeHeader) {
    const body = state.messages.map(m => {
      const prefix = m.type === 'voice' ? 'Eles: ' : 'Eu:   ';
      return prefix + m.text;
    }).join('\n\n');
    const tail = state.interim ? '\n\nEles: ' + state.interim + ' [em transcrição]' : '';
    if (!includeHeader) return body + tail;

    const now = new Date();
    const dateStr = now.toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
    const header = 'Transcrição — ' + dateStr + '\n' + '='.repeat(40) + '\n\n';
    return header + body + tail + '\n';
  }

  function formatDateForFilename(d) {
    const pad = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
         + '_' + pad(d.getHours()) + pad(d.getMinutes());
  }

  function downloadAsFile(content, filename, mime) {
    const blob = new Blob([content], { type: mime + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 200);
  }

  function flashStatus(text, cssClass, durationMs) {
    elStatus.textContent = text;
    elStatus.className = 'status ' + (cssClass || '');
    setTimeout(() => {
      if (!listening && !ttsSpeaking) {
        elStatus.textContent = 'Pronto';
        elStatus.className = 'status';
      }
    }, durationMs || 2000);
  }

  function flashButton(el) {
    el.classList.add('success');
    setTimeout(() => el.classList.remove('success'), 1200);
  }

  elShare.addEventListener('click', async () => {
    if (state.messages.length === 0 && !state.interim) {
      flashStatus('Nada para salvar', 'error', 1500);
      return;
    }
    const content = buildConversationText(true);
    const filename = 'transcricao-' + formatDateForFilename(new Date()) + '.txt';

    // Tenta a Web Share API com arquivo (iOS Safari 15+, Chrome Android)
    try {
      const file = new File([content], filename, { type: 'text/plain' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: 'Transcrição',
          text: 'Transcrição de conversa'
        });
        flashStatus('Compartilhado ✓', 'speaking', 1500);
        flashButton(elShare);
        return;
      }
    } catch (e) {
      // AbortError = usuário cancelou; qualquer outro erro, cai no fallback
      if (e && e.name === 'AbortError') {
        elStatus.textContent = 'Pronto';
        elStatus.className = 'status';
        return;
      }
      console.warn('Web Share falhou:', e);
    }

    // Fallback 1: Web Share só com texto (alguns navegadores não aceitam arquivos)
    try {
      if (navigator.share) {
        await navigator.share({ title: 'Transcrição', text: content });
        flashStatus('Compartilhado ✓', 'speaking', 1500);
        flashButton(elShare);
        return;
      }
    } catch (e) {
      if (e && e.name === 'AbortError') {
        elStatus.textContent = 'Pronto';
        elStatus.className = 'status';
        return;
      }
    }

    // Fallback 2: download direto do arquivo .txt
    try {
      downloadAsFile(content, filename, 'text/plain');
      flashStatus('Arquivo baixado ✓', 'speaking', 2000);
      flashButton(elShare);
    } catch (e) {
      flashStatus('Erro ao salvar: ' + e.message, 'error', 2500);
    }
  });

  elCopy.addEventListener('click', async () => {
    const text = buildConversationText(false);
    if (!text.trim()) {
      elStatus.textContent = 'Nada para copiar';
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
      elStatus.textContent = 'Copiado ✓';
      setTimeout(() => { if (!listening && !ttsSpeaking) elStatus.textContent = 'Pronto'; }, 1500);
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      elStatus.textContent = 'Copiado ✓';
      setTimeout(() => { if (!listening && !ttsSpeaking) elStatus.textContent = 'Pronto'; }, 1500);
    }
  });

  // ===== Modal de ajustes =====
  elSettings.addEventListener('click', () => elModal.classList.add('show'));
  elModalClose.addEventListener('click', () => elModal.classList.remove('show'));
  elModal.addEventListener('click', (e) => {
    if (e.target === elModal) elModal.classList.remove('show');
  });

  elLang.addEventListener('change', () => {
    settings.lang = elLang.value;
    localStorage.setItem('lang', settings.lang);
    loadVoices();
    if (listening) { stopListening(); setTimeout(startListening, 300); }
  });

  elFontRange.addEventListener('input', () => {
    settings.fontSize = parseInt(elFontRange.value, 10);
    elFontLabel.textContent = settings.fontSize;
    document.documentElement.style.setProperty('--font-size', settings.fontSize + 'px');
    localStorage.setItem('fontSize', settings.fontSize);
  });

  elVoiceSelect.addEventListener('change', () => {
    settings.voiceURI = elVoiceSelect.value;
    localStorage.setItem('voiceURI', settings.voiceURI);
  });

  elRateRange.addEventListener('input', () => {
    settings.rate = parseFloat(elRateRange.value);
    elRateLabel.textContent = settings.rate.toFixed(1);
    localStorage.setItem('rate', settings.rate);
  });

  // ===== Wake Lock =====
  let wakeLock = null;
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && listening) requestWakeLock();
  });

  // ===== Service Worker =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW erro:', err));
    });
  }

  render();
})();
</script>
</body>
</html>
